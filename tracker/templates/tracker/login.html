<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zeiss RFQ Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            border: none;
        }
        .login-header {
            background: #003366;
            color: #fff;
            border-radius: 10px 10px 0 0;
            padding: 24px;
            text-align: center;
        }
        .login-header h5 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .login-header small {
            opacity: 0.75;
            font-size: 12px;
        }
        .form-label { font-size: 13px; font-weight: 600; color: #444; }
        .btn-login {
            background: #003366;
            border-color: #003366;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { background: #00224d; border-color: #00224d; }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="login-header">
            <div style="font-size:28px; margin-bottom:6px;">&#128203;</div>
            <h5>Zeiss RFQ Tracker</h5>
            <small>Sign in to continue</small>
        </div>
        <div class="card-body p-4">
            {% if form.errors %}
                <div class="alert alert-danger py-2 text-center" style="font-size:13px;">
                    Invalid username or password.
                </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" autocomplete="current-password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-login text-white">Sign In</button>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
