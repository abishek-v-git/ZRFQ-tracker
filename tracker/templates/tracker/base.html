<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeiss RFQ Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fa; font-size: 13px; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        table.rfq-table {
            min-width: 2400px;
            background: #fff;
            font-size: 12px;
        }
        table.rfq-table thead th {
            background: #003366;
            color: #fff;
            white-space: nowrap;
            vertical-align: middle;
            padding: 10px 8px;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        table.rfq-table tbody tr:hover { background: #eef3fb; }
        table.rfq-table td { vertical-align: middle; padding: 6px 8px; white-space: nowrap; }
        .col-mfr-pn { background: #fffbea; }
        .badge-fc { background: #198754; }
        .btn-action { padding: 2px 8px; font-size: 11px; }
        .form-section {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-label { font-weight: 600; font-size: 11px; color: #555; margin-bottom: 2px; }
        .section-heading {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #003366;
            border-bottom: 2px solid #003366;
            padding-bottom: 4px;
            margin-bottom: 10px;
        }

        /* Sticky Right Columns (Status, Comments, Actions) */
        /* 1. Set fixed widths so offsets are predictable */
        table.rfq-table th:last-child, 
        table.rfq-table td:last-child {
            width: 80px; min-width: 80px; right: 0; z-index: 6;
        }
        
        table.rfq-table th:nth-last-child(2),
        table.rfq-table td:nth-last-child(2) {
            width: 200px; min-width: 200px; right: 80px; z-index: 5;
            border-left: 1px solid #dee2e6;
        }

        table.rfq-table th:nth-last-child(3),
        table.rfq-table td:nth-last-child(3) {
            width: 140px; min-width: 140px; right: 280px; z-index: 4;
            border-left: 1px solid #dee2e6;
        }

        table.rfq-table th:last-child,
        table.rfq-table td:last-child,
        table.rfq-table th:nth-last-child(2),
        table.rfq-table td:nth-last-child(2),
        table.rfq-table th:nth-last-child(3),
        table.rfq-table td:nth-last-child(3) {
            position: sticky;
            box-shadow: -2px 0 5px rgba(0,0,0,0.03);
        }

        /* Header z-index and backgrounds */
        table.rfq-table th:last-child,
        table.rfq-table th:nth-last-child(2),
        table.rfq-table th:nth-last-child(3) {
            z-index: 10;
            background: #003366 !important;
        }

        /* Cell backgrounds */
        table.rfq-table td:last-child,
        table.rfq-table td:nth-last-child(2),
        table.rfq-table td:nth-last-child(3) {
            background: #fff;
        }

        /* Hover states */
        table.rfq-table tbody tr:hover td:last-child,
        table.rfq-table tbody tr:hover td:nth-last-child(2),
        table.rfq-table tbody tr:hover td:nth-last-child(3) {
            background: #eef3fb;
        }

        /* Handle z-index for the highlighted MFR column so it doesn't overlap sticky actions */
        .col-mfr-pn { position: relative; z-index: 1; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#003366;">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-table me-2"></i>Zeiss RFQ Tracker
        </span>
        {% if user.is_authenticated %}
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-light dropdown-toggle d-flex align-items-center gap-2"
                    type="button" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i>
                {{ user.get_full_name|default:user.username }}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text text-muted" style="font-size:12px;">
                    Signed in as <strong>{{ user.username }}</strong>
                </span></li>
                <li><hr class="dropdown-divider my-1"></li>
                <li>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container-fluid px-3 py-3">
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-{{ msg.tags }} alert-dismissible fade show py-2" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
